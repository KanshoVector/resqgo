name: Ops - Supabase Keep Alive

on:
  schedule:
    # Free Plan pause 回避: 7 日間の DB アクティビティ不足で pause（公式 2026-07）
    # 「typically a few user requests to the database each day」→ 1 日 4 回（6 時間ごと）
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep_alive_ping (DB INSERT)
        run: |
          set -euo pipefail
          BODY=$(curl -sf -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/keep_alive_ping" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Response: $BODY"
          echo "$BODY" | grep -q '"status".*"ok"' || {
            echo "Unexpected keep_alive_ping response"
            exit 1
          }

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
