name: Ops - Supabase Bootstrap

on:
  workflow_dispatch:

concurrency:
  group: supabase-bootstrap
  cancel-in-progress: false

jobs:
  apply-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply schema via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "ERROR: Repository secret SUPABASE_ACCESS_TOKEN is not set."
            echo "Create one at: https://supabase.com/dashboard/account/tokens"
            exit 1
          fi
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "ERROR: Repository secret SUPABASE_URL is not set."
            exit 1
          fi
          REF="${SUPABASE_URL#https://}"
          REF="${REF%%.supabase.co*}"
          SQL_JSON=$(jq -Rs . supabase/migrations/0001_resqgo_schema.sql)
          HTTP=$(curl -s -o /tmp/apply_out.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/${REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": ${SQL_JSON}}")
          echo "Management API HTTP ${HTTP}"
          cat /tmp/apply_out.json
          [[ "$HTTP" == "200" || "$HTTP" == "201" ]] || exit 1

      - name: Smoke test (anon key)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          export NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          bash scripts/verify-supabase.sh
