name: Ops - Supabase Bootstrap

on:
  workflow_dispatch:
    inputs:
      apply_0001_reset:
        description: "false=通常（0002以降のみ・データ保持） / true=初回のみ（0001§0RESET・全データ削除）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: supabase-bootstrap
  cancel-in-progress: false

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply migrations via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          APPLY_0001_RESET: ${{ inputs.apply_0001_reset }}
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "ERROR: Repository secret SUPABASE_ACCESS_TOKEN is not set."
            exit 1
          fi
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "ERROR: Repository secret SUPABASE_URL is not set."
            exit 1
          fi
          export NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL"
          MODE="incremental"
          if [[ "$APPLY_0001_RESET" == "true" ]]; then
            MODE="full"
            echo "::warning::apply_0001_reset=true — 0001 §0 RESET will delete all app data."
          fi
          bash scripts/apply-migrations.sh "$MODE"

      - name: Smoke test (anon key)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          export NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          bash scripts/verify-supabase.sh
